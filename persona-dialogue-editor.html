<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Chat — 대화 편집기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --bg2: #17171e;
    --bg3: #1e1e28;
    --bg4: #252530;
    --border: #2e2e3e;
    --border2: #3a3a4e;
    --text: #e8e8f0;
    --text2: #9090b0;
    --text3: #5a5a78;
    --accent: #7c6af0;
    --accent2: #5c4de0;
    --accent-dim: rgba(124,106,240,0.12);
    --accent-dim2: rgba(124,106,240,0.25);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.1);
    --amber: #f0a653;
    --amber-dim: rgba(240,166,83,0.1);
    --red: #f06472;
    --red-dim: rgba(240,100,114,0.1);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.1);
    --radius: 8px;
    --radius-lg: 12px;
    --sidebar-w: 260px;
    --panel-w: 340px;
  }

  html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; overflow: hidden; }

  /* ── Layout ── */
  #app { display: grid; grid-template-columns: var(--sidebar-w) 1fr var(--panel-w); grid-template-rows: 48px 1fr; height: 100vh; }

  /* ── Header ── */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  #header .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; }
  #header .sep { width: 1px; height: 20px; background: var(--border); }
  #header .title { font-size: 13px; color: var(--text2); }
  #header .spacer { flex: 1; }
  #header .stats { display: flex; gap: 16px; font-size: 12px; color: var(--text3); }
  #header .stats span b { color: var(--text2); font-weight: 500; }
  #export-btn {
    padding: 5px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 600;
    background: var(--accent); color: #fff; border: none; cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.15s;
  }
  #export-btn:hover { background: var(--accent2); }

  /* ── Sidebar ── */
  #sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 12px 12px 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
  .char-list { overflow-y: auto; flex: 1; }
  .char-item {
    padding: 10px 14px; cursor: pointer; border-radius: var(--radius); margin: 2px 8px;
    display: flex; align-items: center; gap: 10px; transition: background 0.1s;
    border: 1px solid transparent;
  }
  .char-item:hover { background: var(--bg3); }
  .char-item.active { background: var(--accent-dim); border-color: var(--accent-dim2); }
  .char-avatar {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .char-info { min-width: 0; }
  .char-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .char-meta { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .char-item.active .char-name { color: var(--accent); }

  .add-char-btn {
    margin: 8px; padding: 8px; border-radius: var(--radius); border: 1px dashed var(--border2); cursor: pointer;
    font-size: 12px; color: var(--text3); background: none; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s;
  }
  .add-char-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── Main ── */
  #main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .main-toolbar {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
  }
  .main-toolbar .char-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .main-toolbar .char-bio-edit { font-size: 12px; color: var(--text3); flex: 1; margin-left: 4px; }
  .bio-input {
    background: none; border: none; color: var(--text2); font-size: 12px; font-family: inherit;
    flex: 1; outline: none; min-width: 0;
  }
  .bio-input:focus { color: var(--text); }

  .session-tabs { display: flex; gap: 4px; padding: 8px 16px 0; overflow-x: auto; flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .session-tab {
    padding: 6px 14px 8px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 12px; font-weight: 500;
    color: var(--text3); border: 1px solid transparent; border-bottom: none; margin-bottom: -1px;
    white-space: nowrap; transition: all 0.1s; background: none;
  }
  .session-tab:hover { color: var(--text2); background: var(--bg3); }
  .session-tab.active { color: var(--accent); background: var(--bg); border-color: var(--border); border-bottom-color: var(--bg); }
  .session-tab .del-session { margin-left: 6px; opacity: 0; font-size: 11px; color: var(--red); }
  .session-tab:hover .del-session { opacity: 1; }
  .add-session-tab {
    padding: 6px 10px 8px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px;
    color: var(--text3); background: none; border: none; transition: color 0.1s;
  }
  .add-session-tab:hover { color: var(--accent); }

  .dialogues-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }

  /* ── Dialogue card ── */
  .dlg-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    display: flex; gap: 0; overflow: hidden; cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .dlg-card:hover { border-color: var(--border2); }
  .dlg-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
  .dlg-card.dragging { opacity: 0.4; }
  .dlg-card.drag-over-top { border-top: 2px solid var(--accent); }
  .dlg-card.drag-over-bottom { border-bottom: 2px solid var(--accent); }

  .dlg-drag-handle {
    width: 28px; display: flex; align-items: center; justify-content: center;
    cursor: grab; color: var(--text3); flex-shrink: 0; font-size: 15px;
    border-right: 1px solid var(--border);
  }
  .dlg-drag-handle:hover { color: var(--text2); }
  .dlg-drag-handle:active { cursor: grabbing; }

  .dlg-type-indicator { width: 4px; flex-shrink: 0; }
  .type-normal .dlg-type-indicator { background: var(--text3); }
  .type-ad .dlg-type-indicator { background: var(--amber); }
  .type-quiz .dlg-type-indicator { background: var(--green); }

  .dlg-body { flex: 1; padding: 10px 12px; min-width: 0; }
  .dlg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dlg-idx { font-size: 10px; font-weight: 700; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .dlg-type-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .badge-normal { background: var(--bg4); color: var(--text3); }
  .badge-ad { background: var(--amber-dim); color: var(--amber); }
  .badge-quiz { background: var(--green-dim); color: var(--green); }
  .dlg-brand { font-size: 11px; color: var(--amber); margin-left: auto; font-weight: 600; }

  .dlg-text { font-size: 13px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .dlg-quiz-opts { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .dlg-opt-pill {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--bg4); color: var(--text3); border: 1px solid var(--border);
  }
  .dlg-opt-pill.correct { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.25); }

  .dlg-actions { display: flex; align-items: center; gap: 4px; padding: 0 8px 0 0; flex-shrink: 0; }
  .dlg-btn {
    width: 26px; height: 26px; border-radius: 6px; border: none; background: none;
    cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.1s;
  }
  .dlg-btn:hover { background: var(--bg4); color: var(--text); }
  .dlg-btn.del:hover { background: var(--red-dim); color: var(--red); }

  .add-dlg-btn {
    border: 1px dashed var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer;
    font-size: 12px; color: var(--text3); background: none; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s;
  }
  .add-dlg-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── Right Panel ── */
  #panel {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }

  .field-group { margin-bottom: 16px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .field-label .required { color: var(--red); }
  
  textarea.field-input, input.field-input, select.field-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none;
    padding: 8px 10px; resize: none; transition: border-color 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  textarea.field-input { line-height: 1.6; }
  textarea.field-input:focus, input.field-input:focus, select.field-input:focus { border-color: var(--accent); }
  select.field-input option { background: var(--bg3); }

  .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .type-opt {
    padding: 7px 6px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer;
    text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.15s; background: var(--bg3); color: var(--text3);
  }
  .type-opt:hover { border-color: var(--border2); }
  .type-opt.selected-normal { background: var(--bg4); color: var(--text); border-color: var(--border2); }
  .type-opt.selected-ad { background: var(--amber-dim); color: var(--amber); border-color: rgba(240,166,83,0.3); }
  .type-opt.selected-quiz { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.3); }

  .quiz-opts-editor { display: flex; flex-direction: column; gap: 6px; }
  .quiz-opt-row { display: flex; align-items: center; gap: 6px; }
  .quiz-opt-row input.field-input { flex: 1; }
  .correct-toggle {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer;
    background: var(--bg3); color: var(--text3); font-size: 13px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .correct-toggle.active { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.3); }

  .panel-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); font-size: 13px; }
  .panel-empty .icon { font-size: 32px; }

  .save-btn {
    margin: 0 16px 16px; padding: 9px; border-radius: var(--radius); border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; font-family: inherit;
    transition: background 0.15s;
  }
  .save-btn:hover { background: var(--accent2); }

  /* Add char modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg);
    padding: 24px; width: 100%; max-width: 400px;
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 8px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
  .btn-cancel { background: var(--bg4); color: var(--text2); }
  .btn-confirm { background: var(--accent); color: #fff; }
  .btn-cancel:hover { background: var(--bg3); }
  .btn-confirm:hover { background: var(--accent2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 10px 16px; font-size: 13px; color: var(--text);
    transform: translateY(60px); opacity: 0; transition: all 0.25s;
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(62,207,142,0.4); background: rgba(62,207,142,0.1); color: var(--green); }

  .char-count-badge {
    font-size: 10px; background: var(--bg4); border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 5px; color: var(--text3); font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <span class="logo">Persona</span>
    <span class="sep"></span>
    <span class="title">대화 편집기</span>
    <div class="spacer"></div>
    <div class="stats">
      <span>캐릭터 <b id="stat-chars">0</b></span>
      <span>세션 <b id="stat-sessions">0</b></span>
      <span>대화 <b id="stat-dialogues">0</b></span>
    </div>
    <button id="export-btn" onclick="exportData()">TS 내보내기</button>
  </header>

  <aside id="sidebar">
    <div class="sidebar-section">캐릭터</div>
    <div class="char-list" id="char-list"></div>
    <button class="add-char-btn" onclick="openAddCharModal()">＋ 새 캐릭터 추가</button>
  </aside>

  <main id="main">
    <div class="main-toolbar" id="main-toolbar">
      <div style="color:var(--text3); font-size:13px;">← 캐릭터를 선택하세요</div>
    </div>
    <div class="session-tabs" id="session-tabs" style="display:none;"></div>
    <div class="dialogues-area" id="dialogues-area">
      <div style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:13px;">
        좌측에서 캐릭터를 선택하면 대화를 편집할 수 있습니다.
      </div>
    </div>
  </main>

  <aside id="panel">
    <div class="panel-header">
      <div class="panel-title">대화 편집</div>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="panel-empty">
        <div class="icon">✦</div>
        <div>대화를 클릭하면<br>편집 패널이 열립니다</div>
      </div>
    </div>
  </aside>
</div>

<div id="toast"></div>

<div id="add-char-modal" class="modal-overlay" style="display:none;" onclick="closeModalIfBg(event)">
  <div class="modal">
    <h3>새 캐릭터 추가</h3>
    <div class="field-group">
      <div class="field-label">이름 <span class="required">*</span></div>
      <input class="field-input" id="nc-name" placeholder="예: 지원" style="height:36px;">
    </div>
    <div class="field-group">
      <div class="field-label">나이</div>
      <input class="field-input" id="nc-age" type="number" placeholder="예: 25" style="height:36px;">
    </div>
    <div class="field-group">
      <div class="field-label">소개</div>
      <textarea class="field-input" id="nc-bio" rows="2" placeholder="캐릭터 소개 한 줄"></textarea>
    </div>
    <div class="field-group">
      <div class="field-label">ID (영문)</div>
      <input class="field-input" id="nc-id" placeholder="예: jiwon" style="height:36px; font-family:monospace;">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddCharModal()">취소</button>
      <button class="btn-confirm" onclick="confirmAddChar()">추가</button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────
const AVATAR_COLORS = [
  ['#4f46e5','#c4c0fb'],['#0891b2','#a5f3fc'],['#059669','#6ee7b7'],
  ['#d97706','#fde68a'],['#dc2626','#fca5a5'],['#7c3aed','#ddd6fe'],
];

let data = {
  characters: [
    {
      id: 'sujin', name: '수진', age: 26,
      bio: '카페에서 그림을 그리는 것을 좋아하는 일러스트레이터입니다.',
      image: '/char.png', bgImage: '/back.png',
      sessions: [
        { dialogues: [
          { type: 'normal', text: '안녕! 오늘 여기 처음 왔어? 나는 여기 단골인데 😊' },
          { type: 'normal', text: '나 일러스트레이터야. 카페에서 그림 그리는 게 취미이자 일이거든.' },
          { type: 'normal', text: '근데 요즘 피부가 너무 건조해서 고민이야. 날씨 때문인가...' },
          { type: 'ad', text: '아 맞다! 친구한테 추천받은 세럼 써봤는데 진짜 달라졌어. 라운드랩 자작나무 수분크림이었나? 되게 가볍고 촉촉하더라고.', adBrand: 'ROUNDLAB' },
          { type: 'quiz', text: '근데 너는 피부 어떤 타입이야? 나랑 같은 건성인가?', quizOptions: ['지성 피부야','건성 피부야','복합성이야','잘 모르겠어'], quizAnswer: 1 },
          { type: 'normal', text: '어머 나랑 같네! 그럼 더 잘 맞겠다 😄' },
          { type: 'normal', text: '다음에 같이 스케치하러 오지 않을래? 내가 자주 오는 자리 있어.' },
          { type: 'normal', text: '오늘 대화 즐거웠어. 또 봐요 😊' },
        ]},
        { dialogues: [
          { type: 'normal', text: '어, 또 왔네! 반가워 😊' },
          { type: 'normal', text: '오늘은 새 프로젝트 작업 중이야. 브랜드 로고 디자인인데 쉽지 않더라고.' },
          { type: 'normal', text: '디자인할 때 제일 힘든 게 뭔지 알아? 클라이언트 피드백이야 ㅋㅋ' },
          { type: 'normal', text: '그래도 완성됐을 때 뿌듯함은 진짜 최고거든.' },
          { type: 'quiz', text: '너는 창작 활동 같은 거 해본 적 있어?', quizOptions: ['그림 그려봤어','글 써봤어','음악 해봤어','없어'], quizAnswer: 0 },
          { type: 'normal', text: '오 멋지다! 취미로도 창작하는 사람 좋아.' },
          { type: 'ad', text: '참고로 나 요즘 웨이브온 태블릿 쓰는데 진짜 신세계야. 손 그림 느낌 그대로 나와서 너무 좋아.', adBrand: 'WAVEON' },
          { type: 'normal', text: '다음에 작업물 보여줄게! 기대해도 좋아 😄' },
        ]},

// ── Helpers ──────────────────────────────────────────────────────
function getAvatarColor(idx) { return AVATAR_COLORS[idx % AVATAR_COLORS.length]; }
function totalSessions() { return data.characters.reduce((s,c)=>s+c.sessions.length,0); }
function totalDialogues() { return data.characters.reduce((s,c)=>s+c.sessions.reduce((ss,se)=>ss+se.dialogues.length,0),0); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type ? `show ${type}` : 'show';
  clearTimeout(t._to);
  t._to = setTimeout(()=>{ t.className = type; }, 2000);
}

// ── Render ────────────────────────────────────────────────────────
function renderAll() {
  renderSidebar();
  renderMain();
  updateStats();
}

function updateStats() {
  document.getElementById('stat-chars').textContent = data.characters.length;
  document.getElementById('stat-sessions').textContent = totalSessions();
  document.getElementById('stat-dialogues').textContent = totalDialogues();
}

function renderSidebar() {
  const list = document.getElementById('char-list');
  list.innerHTML = '';
  data.characters.forEach((c, i) => {
    const [bg, fg] = getAvatarColor(i);
    const div = document.createElement('div');
    div.className = 'char-item' + (i === selCharIdx ? ' active' : '');
    div.onclick = () => selectChar(i);
    const dlgCount = c.sessions.reduce((s,se)=>s+se.dialogues.length,0);
    div.innerHTML = `
      <div class="char-avatar" style="background:${bg}20; color:${fg}; border: 1px solid ${bg}40;">${c.name[0]}</div>
      <div class="char-info">
        <div class="char-name">${c.name}</div>
        <div class="char-meta">${c.age}세 · 세션 ${c.sessions.length} · 대화 ${dlgCount}</div>
      </div>`;
    list.appendChild(div);
  });
}

function selectChar(i) {
  selCharIdx = i;
  selSessionIdx = 0;
  selDlgIdx = -1;
  renderAll();
  renderPanel();
}

function renderMain() {
  const toolbar = document.getElementById('main-toolbar');
  const tabs = document.getElementById('session-tabs');
  const area = document.getElementById('dialogues-area');

  if (selCharIdx < 0) {
    toolbar.innerHTML = `<div style="color:var(--text3); font-size:13px;">← 캐릭터를 선택하세요</div>`;
    tabs.style.display = 'none';
    area.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:13px;">좌측에서 캐릭터를 선택하면 대화를 편집할 수 있습니다.</div>`;
    return;
  }

  const char = data.characters[selCharIdx];
  const [bg, fg] = getAvatarColor(selCharIdx);

  toolbar.innerHTML = `
    <div class="char-avatar" style="width:28px;height:28px;font-size:12px;background:${bg}20;color:${fg};border:1px solid ${bg}40;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;">${char.name[0]}</div>
    <div class="char-title">${char.name}</div>
    <span style="color:var(--text3);font-size:12px;">·</span>
    <input class="bio-input" value="${char.bio}" placeholder="소개 입력..." onchange="updateCharBio(event)" style="flex:1;">
    <button onclick="deleteChar(${selCharIdx})" style="padding:4px 10px;border-radius:6px;border:1px solid var(--red-dim);background:var(--red-dim);color:var(--red);cursor:pointer;font-size:11px;font-weight:600;">삭제</button>
  `;

  tabs.style.display = 'flex';
  tabs.innerHTML = '';
  char.sessions.forEach((s, i) => {
    const tab = document.createElement('button');
    tab.className = 'session-tab' + (i === selSessionIdx ? ' active' : '');
    tab.innerHTML = `세션 ${i+1} <span class="char-count-badge">${s.dialogues.length}</span><span class="del-session" onclick="deleteSession(event,${i})">✕</span>`;
    tab.onclick = (e) => { if (!e.target.classList.contains('del-session')) selectSession(i); };
    tabs.appendChild(tab);
  });
  const addTab = document.createElement('button');
  addTab.className = 'add-session-tab';
  addTab.textContent = '+';
  addTab.title = '세션 추가';
  addTab.onclick = addSession;
  tabs.appendChild(addTab);

  renderDialogues();
}

function renderDialogues() {
  if (selCharIdx < 0) return;
  const char = data.characters[selCharIdx];
  const session = char.sessions[selSessionIdx];
  const area = document.getElementById('dialogues-area');
  area.innerHTML = '';

  if (!session) return;

  session.dialogues.forEach((d, i) => {
    const card = createDlgCard(d, i);
    area.appendChild(card);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-dlg-btn';
  addBtn.innerHTML = '＋ 대화 추가';
  addBtn.onclick = addDialogue;
  area.appendChild(addBtn);
}

function createDlgCard(d, i) {
  const card = document.createElement('div');
  card.className = `dlg-card type-${d.type}` + (i === selDlgIdx ? ' selected' : '');
  card.dataset.idx = i;
  card.draggable = true;

  const badgeMap = { normal: '일반', ad: '광고', quiz: '퀴즈' };
  const badgeClass = { normal: 'badge-normal', ad: 'badge-ad', quiz: 'badge-quiz' };

  let extraHtml = '';
  if (d.type === 'ad' && d.adBrand) {
    extraHtml = `<span class="dlg-brand">${d.adBrand}</span>`;
  }
  if (d.type === 'quiz' && d.quizOptions) {
    const opts = d.quizOptions.map((o, oi) =>
      `<span class="dlg-opt-pill${oi === d.quizAnswer ? ' correct' : ''}">${o}</span>`
    ).join('');
    extraHtml = `<div class="dlg-quiz-opts">${opts}</div>`;
  }

  card.innerHTML = `
    <div class="dlg-drag-handle" title="드래그하여 순서 변경">⠿</div>
    <div class="dlg-type-indicator"></div>
    <div class="dlg-body">
      <div class="dlg-header">
        <span class="dlg-idx">#${String(i+1).padStart(2,'0')}</span>
        <span class="dlg-type-badge ${badgeClass[d.type]}">${badgeMap[d.type]}</span>
        ${extraHtml && d.type === 'ad' ? extraHtml : ''}
      </div>
      <div class="dlg-text">${d.text}</div>
      ${extraHtml && d.type === 'quiz' ? extraHtml : ''}
    </div>
    <div class="dlg-actions">
      <button class="dlg-btn" title="위로" onclick="moveDlg(event,${i},-1)">↑</button>
      <button class="dlg-btn" title="아래로" onclick="moveDlg(event,${i},1)">↓</button>
      <button class="dlg-btn del" title="삭제" onclick="deleteDlg(event,${i})">✕</button>
    </div>
  `;

  card.onclick = (e) => {
    if (e.target.closest('.dlg-actions') || e.target.closest('.dlg-drag-handle')) return;
    selectDlg(i);
  };

  // Drag events
  card.addEventListener('dragstart', (e) => {
    dragSrcIdx = i;
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.dlg-card').forEach(c => {
      c.classList.remove('drag-over-top','drag-over-bottom');
    });
    dragSrcIdx = null;
    dragOverIdx = null;
  });
  card.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (dragSrcIdx === null || dragSrcIdx === i) return;
    const rect = card.getBoundingClientRect();
    const pos = e.clientY < rect.top + rect.height / 2 ? 'top' : 'bottom';
    card.classList.toggle('drag-over-top', pos === 'top');
    card.classList.toggle('drag-over-bottom', pos === 'bottom');
    dragOverIdx = i;
    dragOverPos = pos;
  });
  card.addEventListener('dragleave', () => {
    card.classList.remove('drag-over-top','drag-over-bottom');
  });
  card.addEventListener('drop', (e) => {
    e.preventDefault();
    if (dragSrcIdx === null || dragSrcIdx === dragOverIdx) return;
    const char = data.characters[selCharIdx];
    const dlgs = char.sessions[selSessionIdx].dialogues;
    const [removed] = dlgs.splice(dragSrcIdx, 1);
    let targetIdx = dragOverIdx > dragSrcIdx ? dragOverIdx - 1 : dragOverIdx;
    if (dragOverPos === 'bottom') targetIdx++;
    dlgs.splice(Math.max(0, Math.min(targetIdx, dlgs.length)), 0, removed);
    if (selDlgIdx === dragSrcIdx) selDlgIdx = targetIdx;
    renderDialogues();
    updateStats();
    showToast('순서가 변경되었습니다', 'success');
  });

  return card;
}

function selectDlg(i) {
  selDlgIdx = i;
  renderDialogues();
  renderPanel();
}

function selectSession(i) {
  selSessionIdx = i;
  selDlgIdx = -1;
  renderMain();
  renderPanel();
}

function addSession() {
  const char = data.characters[selCharIdx];
  char.sessions.push({ dialogues: [{ type: 'normal', text: '새로운 세션을 시작하세요.' }] });
  selSessionIdx = char.sessions.length - 1;
  selDlgIdx = -1;
  renderAll();
  showToast(`세션 ${char.sessions.length} 추가됨`, 'success');
}

function deleteSession(e, i) {
  e.stopPropagation();
  const char = data.characters[selCharIdx];
  if (char.sessions.length <= 1) { showToast('최소 1개의 세션이 필요합니다'); return; }
  if (!confirm(`세션 ${i+1}을 삭제할까요?`)) return;
  char.sessions.splice(i, 1);
  if (selSessionIdx >= char.sessions.length) selSessionIdx = char.sessions.length - 1;
  selDlgIdx = -1;
  renderAll();
  showToast('세션 삭제됨');
}

function addDialogue() {
  const char = data.characters[selCharIdx];
  char.sessions[selSessionIdx].dialogues.push({ type: 'normal', text: '' });
  selDlgIdx = char.sessions[selSessionIdx].dialogues.length - 1;
  renderDialogues();
  renderPanel();
  updateStats();
  document.getElementById('dialogues-area').lastElementChild.previousElementSibling?.scrollIntoView({ behavior: 'smooth' });
}

function deleteDlg(e, i) {
  e.stopPropagation();
  const dlgs = data.characters[selCharIdx].sessions[selSessionIdx].dialogues;
  if (dlgs.length <= 1) { showToast('최소 1개의 대화가 필요합니다'); return; }
  dlgs.splice(i, 1);
  if (selDlgIdx >= dlgs.length) selDlgIdx = dlgs.length - 1;
  else if (selDlgIdx === i) selDlgIdx = -1;
  renderDialogues();
  renderPanel();
  updateStats();
}

function moveDlg(e, i, dir) {
  e.stopPropagation();
  const dlgs = data.characters[selCharIdx].sessions[selSessionIdx].dialogues;
  const to = i + dir;
  if (to < 0 || to >= dlgs.length) return;
  [dlgs[i], dlgs[to]] = [dlgs[to], dlgs[i]];
  if (selDlgIdx === i) selDlgIdx = to;
  else if (selDlgIdx === to) selDlgIdx = i;
  renderDialogues();
}

function updateCharBio(e) {
  data.characters[selCharIdx].bio = e.target.value;
  renderSidebar();
}

function deleteChar(i) {
  if (!confirm(`'${data.characters[i].name}' 캐릭터를 삭제할까요?`)) return;
  data.characters.splice(i, 1);
  selCharIdx = -1;
  selSessionIdx = 0;
  selDlgIdx = -1;
  renderAll();
  renderPanel();
}

// ── Panel ─────────────────────────────────────────────────────────
function renderPanel() {
  const pb = document.getElementById('panel-body');
  if (selCharIdx < 0 || selDlgIdx < 0) {
    pb.innerHTML = `<div class="panel-empty"><div class="icon">✦</div><div>대화를 클릭하면<br>편집 패널이 열립니다</div></div>`;
    return;
  }
  const dlg = data.characters[selCharIdx].sessions[selSessionIdx].dialogues[selDlgIdx];
  if (!dlg) { pb.innerHTML = `<div class="panel-empty"><div class="icon">✦</div><div>대화를 클릭하면<br>편집 패널이 열립니다</div></div>`; return; }

  pb.innerHTML = `
    <div class="field-group">
      <div class="field-label">타입 <span class="required">*</span></div>
      <div class="type-selector">
        <div class="type-opt${dlg.type==='normal'?' selected-normal':''}" onclick="setDlgType('normal')">일반</div>
        <div class="type-opt${dlg.type==='ad'?' selected-ad':''}" onclick="setDlgType('ad')">광고</div>
        <div class="type-opt${dlg.type==='quiz'?' selected-quiz':''}" onclick="setDlgType('quiz')">퀴즈</div>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">대화 텍스트 <span class="required">*</span></div>
      <textarea class="field-input" id="p-text" rows="5" placeholder="대화 내용을 입력하세요...">${escHtml(dlg.text)}</textarea>
    </div>
    ${dlg.type==='ad' ? `
    <div class="field-group">
      <div class="field-label">광고 브랜드</div>
      <input class="field-input" id="p-brand" value="${escHtml(dlg.adBrand||'')}" placeholder="예: ROUNDLAB" style="height:36px; text-transform:uppercase; font-family:'JetBrains Mono',monospace; font-size:12px;">
    </div>` : ''}
    ${dlg.type==='quiz' ? renderQuizEditor(dlg) : ''}
  `;

  document.getElementById('p-text').addEventListener('input', e => {
    dlg.text = e.target.value;
    renderDialogues();
  });
  if (dlg.type === 'ad') {
    document.getElementById('p-brand').addEventListener('input', e => {
      dlg.adBrand = e.target.value.toUpperCase();
      renderDialogues();
    });
  }
}

function renderQuizEditor(dlg) {
  const opts = dlg.quizOptions || ['','','',''];
  while (opts.length < 4) opts.push('');
  const ans = dlg.quizAnswer ?? 0;
  let rows = opts.map((o,i) => `
    <div class="quiz-opt-row">
      <input class="field-input" value="${escHtml(o)}" placeholder="선택지 ${i+1}" onchange="updateQuizOpt(${i}, this.value)" style="height:34px;">
      <button class="correct-toggle${i===ans?' active':''}" onclick="setQuizAnswer(${i})" title="정답으로 설정">✓</button>
    </div>
  `).join('');
  return `
    <div class="field-group">
      <div class="field-label">선택지 (✓ 정답)</div>
      <div class="quiz-opts-editor">${rows}</div>
    </div>
  `;
}

function setDlgType(type) {
  const dlg = data.characters[selCharIdx].sessions[selSessionIdx].dialogues[selDlgIdx];
  dlg.type = type;
  if (type === 'quiz' && !dlg.quizOptions) { dlg.quizOptions = ['','','','']; dlg.quizAnswer = 0; }
  if (type === 'ad' && !dlg.adBrand) { dlg.adBrand = ''; }
  renderDialogues();
  renderPanel();
}

function updateQuizOpt(i, val) {
  const dlg = data.characters[selCharIdx].sessions[selSessionIdx].dialogues[selDlgIdx];
  if (!dlg.quizOptions) dlg.quizOptions = ['','','',''];
  dlg.quizOptions[i] = val;
  renderDialogues();
}

function setQuizAnswer(i) {
  const dlg = data.characters[selCharIdx].sessions[selSessionIdx].dialogues[selDlgIdx];
  dlg.quizAnswer = i;
  renderPanel();
  renderDialogues();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Add Char Modal ────────────────────────────────────────────────
function openAddCharModal() {
  document.getElementById('nc-name').value = '';
  document.getElementById('nc-age').value = '';
  document.getElementById('nc-bio').value = '';
  document.getElementById('nc-id').value = '';
  document.getElementById('add-char-modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('nc-name').focus(), 50);
}
function closeAddCharModal() { document.getElementById('add-char-modal').style.display = 'none'; }
function closeModalIfBg(e) { if (e.target.id === 'add-char-modal') closeAddCharModal(); }
function confirmAddChar() {
  const name = document.getElementById('nc-name').value.trim();
  if (!name) { showToast('이름을 입력하세요'); return; }
  const id = document.getElementById('nc-id').value.trim() || name.toLowerCase().replace(/\s/g,'');
  const age = parseInt(document.getElementById('nc-age').value) || 20;
  const bio = document.getElementById('nc-bio').value.trim() || '';
  data.characters.push({
    id, name, age, bio, image: '/char.png', bgImage: '/back.png',
    sessions: [{ dialogues: [{ type: 'normal', text: `안녕하세요! 저는 ${name}이에요 😊` }] }]
  });
  closeAddCharModal();
  selCharIdx = data.characters.length - 1;
  selSessionIdx = 0;
  selDlgIdx = -1;
  renderAll();
  renderPanel();
  showToast(`${name} 추가됨`, 'success');
}

// ── Export ────────────────────────────────────────────────────────
function exportData() {
  const lines = [];
  lines.push(`import { Character } from '../types';\n`);
  lines.push(`export const CHARACTERS: Character[] = [`);
  data.characters.forEach((c, ci) => {
    lines.push(`  {`);
    lines.push(`    id: '${c.id}',`);
    lines.push(`    name: '${c.name}',`);
    lines.push(`    age: ${c.age},`);
    lines.push(`    bio: '${c.bio}',`);
    lines.push(`    image: '${c.image}',`);
    lines.push(`    bgImage: '${c.bgImage}',`);
    lines.push(`    sessions: [`);
    c.sessions.forEach((s, si) => {
      lines.push(`      {`);
      lines.push(`        dialogues: [`);
      s.dialogues.forEach((d, di) => {
        let dStr = `          { type: '${d.type}', text: '${d.text.replace(/'/g,"\\'")}' `;
        if (d.type === 'ad' && d.adBrand) dStr += `, adBrand: '${d.adBrand}' `;
        if (d.type === 'quiz' && d.quizOptions) {
          const opts = d.quizOptions.map(o=>`'${o.replace(/'/g,"\\'")}' `).join(', ');
          dStr += `, quizOptions: [${opts}], quizAnswer: ${d.quizAnswer ?? 0} `;
        }
        dStr += `},`;
        lines.push(dStr);
      });
      lines.push(`        ],`);
      lines.push(`      },`);
    });
    lines.push(`    ],`);
    lines.push(`  },`);
  });
  lines.push(`];\n`);
  const content = lines.join('\n');
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'characters.ts';
  a.click();
  showToast('characters.ts 다운로드 완료 ✓', 'success');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddCharModal(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'e') { e.preventDefault(); exportData(); }
});

// Init
renderAll();
</script>
